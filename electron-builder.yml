# electron-builder config for the Berth desktop app. The packaged app's entry is electron/main.cjs
# (set via extraMetadata.main so the repo's package.json stays CLI-oriented). Native addons and
# node-pty's spawn-helper MUST be unpacked from the asar so the OS loader can dlopen them.
appId: dev.berth.app
productName: Berth
directories:
  output: release
extraMetadata:
  main: electron/main.cjs
files:
  - electron/**
  - dist/**
  - bin/**        # bin/berth.mjs is the CLI entry the agent shim (src/pty/agent-shim) re-invokes; the
                  # app-spawned `berth` skill resolves it relative to dist/ — without this it's missing
  - skills/**     # bundled berth-tasks skill; Settings can install/update it for DMG users
  - public/**
  - web/dist/**   # Berth 2.0 React SPA — served at /app; without this the packaged app ships only 1.0
  - package.json
# .node binaries + node-pty's spawn-helper cannot run from inside an asar archive — unpack them.
asarUnpack:
  - "**/*.node"
  - "node_modules/node-pty/**"
  - "node_modules/better-sqlite3/**"
  - "dist/**"
  - "bin/**"      # unpacked alongside dist/** so the shim's `node bin/berth.mjs` → import('../dist/cli.js')
                  # resolves across the asar boundary without mixed asar/unpacked import paths
  - "public/**"
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  # Finder/LaunchServices starts the app with NO locale env, so libc/CoreFoundation fall back to the
  # `C` locale whose macOS system encoding is Mac OS Roman. That makes Chromium write the legacy
  # `«class TEXT»` clipboard flavor as the UTF-8 bytes reinterpreted as Mac Roman → pasting Berth output
  # into apps that read that flavor (e.g. Feishu) yields mojibake. Seeding a UTF-8 locale BEFORE launch
  # (LSEnvironment is applied by LaunchServices pre-exec, so CoreFoundation reads it at init) makes the
  # system encoding UTF-8 and the flavor correct. A UTF-8 LC_CTYPE overrides the otherwise-inherited
  # Mac-Roman __CF_USER_TEXT_ENCODING (verified against the macOS pasteboard).
  extendInfo:
    LSEnvironment:
      LANG: en_US.UTF-8
      LC_CTYPE: en_US.UTF-8
  # Publicly downloaded macOS builds must be Developer ID signed and notarized, otherwise Gatekeeper
  # reports the app as damaged after download. The release script preflights the required credentials.
  forceCodeSigning: true
  hardenedRuntime: true
  notarize: true
win:
  target: nsis
linux:
  target: AppImage
